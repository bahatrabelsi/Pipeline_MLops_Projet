name: CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # declenchement manuel possible

env:
  RESOURCE_GROUP: rg-mlops
  WORKSPACE: ws-mlops

jobs:
  train-register-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connexion a Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Installer l'extension Azure ML CLI v2
        run: az extension add -n ml -y

      - name: Lancer le job d'entrainement
        run: |
          az ml job create \
            --file azure-ml/job.yaml \
            --resource-group $RESOURCE_GROUP \
            --workspace-name $WORKSPACE \
            --stream

      - name: Mettre a jour / creer le deploiement blue
        run: |
          az ml online-endpoint create -f azure-ml/endpoint.yaml \
            --resource-group $RESOURCE_GROUP --workspace-name $WORKSPACE || true
          az ml online-deployment create -f azure-ml/deployment-blue.yaml \
            --resource-group $RESOURCE_GROUP --workspace-name $WORKSPACE

      - name: Router 100% du trafic vers blue
        run: |
          az ml online-endpoint update --name iris-endpoint \
            --traffic "blue=100" \
            --resource-group $RESOURCE_GROUP --workspace-name $WORKSPACE
