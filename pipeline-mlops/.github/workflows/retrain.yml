name: Retrain on Drift

# 3 declencheurs possibles (MLOPSB-15) :
on:
  schedule:
    - cron: "0 3 * * 1"        # tous les lundis a 03h00 UTC
  workflow_dispatch:            # declenchement manuel depuis GitHub
  repository_dispatch:          # declenchement par appel API externe
    types: [drift-detected]

env:
  RESOURCE_GROUP: rg-mlops
  WORKSPACE: ws-mlops

jobs:
  # ---------- ETAPE 1 : verifier s'il y a derive ----------
  check-drift:
    runs-on: ubuntu-latest
    outputs:
      drift: ${{ steps.drift.outputs.detected }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Detecter la derive des donnees
        id: drift
        run: |
          if python src/data_drift.py \
               --baseline data/iris.csv \
               --current data/iris_production.csv; then
            echo "detected=false" >> $GITHUB_OUTPUT
          else
            echo "detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Publier le rapport de derive
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift_report.json

  # ---------- ETAPE 2 : re-entrainer SI derive ----------
  retrain:
    needs: check-drift
    if: needs.check-drift.outputs.drift == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connexion a Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Installer l'extension Azure ML
        run: az extension add -n ml -y

      - name: Relancer l'entrainement
        run: |
          az ml job create --file azure-ml/job.yaml \
            --resource-group $RESOURCE_GROUP \
            --workspace-name $WORKSPACE --stream

      - name: Deployer le nouveau modele comme Challenger (10% du trafic)
        run: |
          az ml online-deployment create -f azure-ml/deployment-green.yaml \
            --resource-group $RESOURCE_GROUP --workspace-name $WORKSPACE
          az ml online-endpoint update --name iris-endpoint \
            --traffic "blue=90 green=10" \
            --resource-group $RESOURCE_GROUP --workspace-name $WORKSPACE
